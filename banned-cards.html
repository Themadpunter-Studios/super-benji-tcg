---
layout: default
title: Banned Cards
permalink: /banned-cards.html
---

<header class="hero" id="top">
  <div class="hero__bg-shape hero__bg-shape--left" aria-hidden="true"></div>
  <div class="hero__bg-shape hero__bg-shape--right" aria-hidden="true"></div>
  <section class="hero__content">
    <p class="eyebrow">Format Policy</p>
    <h1>Banned Cards</h1>
    <p class="hero__lead">Cards on this list are not legal for deck construction.</p>
  </section>
</header>

<main>
  <section class="section section--highlight">
    <div class="section__heading">
      <p class="eyebrow">Current List</p>
      <h2>Super Benji TCG Ban List</h2>
    </div>

    <div class="pillars">
      {% for card in site.data.banned_cards %}
      <article class="pillar">
        <h3>{{ card.name }}</h3>
        <p>{{ card.reason }}</p>
      </article>
      {% endfor %}
    </div>
  </section>
</main>
